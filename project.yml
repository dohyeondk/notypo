name: Notypo
options:
  bundleIdPrefix: dev.cedars
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "26.0"
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
targets:
  Notypo:
    type: application
    platform: macOS
    sources:
      - Notypo
    dependencies:
      - package: KeyboardShortcuts
    settings:
      INFOPLIST_FILE: Notypo/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: dev.cedars.Notypo
      PRODUCT_NAME: Notypo
      COMBINE_HIDPI_IMAGES: true
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: M48V2XMY2U
